<!DOCTYPE html>
<html lang="en">
   <head>
      <title>HBD Sayangku Anggie ❤️</title>
      
      <meta http-equiv="content-type" content="text/html; charset=utf-8" />
      <meta name="author" content="Anggun Ganteng" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
      <meta name="apple-mobile-web-app-capable" content="yes">
      <meta name="mobile-web-app-capable" content="yes">

      <meta property="og:title" content="Hadiah Buat Anggie" />
      <meta property="og:description" content="Mainin gamenya dulu ya sayang!" />
      <meta property="og:type" content="website" />

      <link href="css/reset.css" rel="stylesheet">
      <link href="css/main.css" rel="stylesheet">
      
      <style>
         /* === CSS PRO FIX FULLSCREEN & GEDEEE === */
         body, html {
            overflow: hidden;
            background-color: #70c5ce;
            height: 100%;
            width: 100%;
            margin: 0; padding: 0;
         }
         #gamecontainer {
            position: absolute;
            top: 0; left: 0;
            width: 100% !important;
            height: 100% !important;
            min-height: 100% !important;
         }
         /* PENTING: Tampilan biar gede pas mobile (Portrait) */
         #gamescreen {
            position: relative;
            width: 100% !important;
            height: 100% !important;
            transform-origin: top left;
         }
         #splash, #scoreboard {
            /* Biar splash screen & scoreboard ditaruh di tengah pas mobile */
            left: 50% !important;
            transform: translateX(-50%) !important;
         }
         #footer {
            display: none !important; /* Ngilangin watermark Nebez total */
         }
         #custom-tagline {
            position: fixed;
            bottom: 10px;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
         }
         #custom-tagline p {
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
         }
      </style>
   </head>
   <body>
      <div id="gamecontainer">
         <div id="gamescreen">
            <div id="sky" class="animated">
               <div id="flyarea">
                  <div id="ceiling" class="animated"></div>
                  <div id="player" class="bird animated"></div>

                  <div id="bigscore"></div>

                  <div id="splash"></div>

                  <div id="scoreboard">
                     <div id="medal"></div>
                     <div id="currentscore"></div>
                     <div id="highscore"></div>
                     <div id="replay"><img src="assets/replay.png" alt="replay"></div>
                  </div>
               </div>
            </div>
            <div id="land" class="animated"><div id="debug"></div></div>
         </div>
      </div>

      <div id="custom-tagline">
         <p>Dibuat dengan ❤️ oleh Orang Ganteng buat Anggie Dwi Aprilia</p>
      </div>

      <div class="boundingbox" id="playerbox"></div>
      <div class="boundingbox" id="pipebox"></div>

      <script src="js/jquery.min.js"></script>
      <script src="js/jquery.transit.min.js"></script>
      <script src="js/buzz.min.js"></script>
      <script src="js/main.js"></script>
   </body>
</html>
